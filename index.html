<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BugOps - Fix the Bug!</title>
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>
  <div class="container">
    <h1>🚀 <b>BugOps: Fix the Bug!</b></h1>

    <p>📝 <b>Task:</b> <span id="task">Task will appear here.</span></p>
    
    <h2 id="level-title">Level 1</h2>
    <h2 id="player-title">👶 Newbie Coder</h2>

    <!-- XP Counter -->
    <p><b>XP:</b> <span id="xp">0</span></p>

    <!-- XP Progress Bar -->
    <div id="xp-container" style="width: 100%; background: #ddd; border-radius: 10px; margin: 10px 0;">
      <div id="xp-bar" style="width: 0%; height: 20px; background: limegreen; border-radius: 10px; text-align: center; color: white; font-size: 12px;">
        0 XP
      </div>
    </div>

    <!-- Code Box -->
    <textarea id="code-box" rows="10" cols="100" placeholder="Fix the code here..."></textarea><br/>

    <!-- Buttons -->
    <button onclick="checkFix()">✅ Submit Fix</button>
    <button onclick="getHint()">💡 Get Hint (-5 XP)</button>
    <button onclick="nextLevel()">➡️ Next Level</button>

    <!-- Feedback -->
    <p id="feedback"></p>

    <!-- Level Up Popup -->
     <div id="level-up-popup" style="display:none;"></div>

    <div id="level-up-popup" style="
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      font-weight: bold;
      color: gold;
      text-shadow: 2px 2px 10px black;
      display: none;
      z-index: 9999;
    ">
      🚀 LEVEL UP! 🚀
    </div>
  </div>

  <!-- JS Scripts -->
  <script src="style/levels/levels.js"></script>
  <script src="script/script.js"></script>

  <!-- Animation for falling stars -->
  <style>
    @keyframes fall {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(100vh); opacity: 0; }
    }
  </style>
</body>
</html>
