<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BugOps - Fix the Bug!</title>
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>
  <div class="container">
    <h1>🚀 <b>BugOps: Fix the Bug!</b></h1>

    <p>📝 <b>Task:</b> <span id="task">Task will appear here.</span></p>
    
    <h2 id="level-title">Level 1</h2>

    <textarea id="code-box" rows="10" cols="100" placeholder="Fix the code here..."></textarea><br/>

    <button onclick="checkFix()">✅ Submit Fix</button>
    <button onclick="getHint()">💡 Get Hint (-5 XP)</button>
    <button onclick="nextLevel()">➡️ Next Level</button>

    <p id="feedback"></p>
    <p><b>XP:</b> <span id="xp">0</span></p>
  </div>

  <!-- JS Scripts -->
  <script src="style/levels/levels.js"></script>
  <script src="script/script.js"></script>
</body>
</html>
